name: Notify Discord on deploy
on:
  deployment_status: {}
  workflow_dispatch: {}
jobs:
  notify:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.environment == 'Production' &&
       (github.event.deployment_status.state == 'success' ||
        github.event.deployment_status.state == 'failure' ||
        github.event.deployment_status.state == 'error'))
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATE: ${{ github.event.deployment_status.state || 'success' }}
          ENVIRONMENT: ${{ github.event.deployment_status.environment || 'Production' }}
          TARGET_URL: ${{ github.event.deployment_status.target_url || 'https://example.com' }}
          SHA: ${{ github.event.deployment.sha || github.sha }}
          REF: ${{ github.event.deployment.ref || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then echo "::error::secret empty"; exit 1; fi
          echo "URL length: ${#DISCORD_WEBHOOK_URL}"
          if [ "$STATE" = "success" ]; then COLOR=3066993; else COLOR=15158332; fi
          UPPER_STATE=$(printf '%s' "$STATE" | tr '[:lower:]' '[:upper:]')
          SHORT_SHA=$(printf '%s' "$SHA" | cut -c1-7)
          jq -n --arg title "Deploy to ${ENVIRONMENT}: ${UPPER_STATE}" --arg url "$TARGET_URL" \
            --arg desc "\`${REPO}\` deployment is now ${UPPER_STATE}." --arg env "$ENVIRONMENT" --arg branch "$REF" \
            --arg commit "[${SHORT_SHA}](https://github.com/${REPO}/commit/${SHA})" --argjson color "$COLOR" \
            '{embeds:[{title:$title,url:$url,description:$desc,color:$color,fields:[{name:"Environment",value:$env,inline:true},{name:"Branch",value:$branch,inline:true},{name:"Commit",value:$commit,inline:true}]}]}' \
            | curl -fsS -X POST -H "Content-Type: application/json" --data @- "$DISCORD_WEBHOOK_URL"
          echo "curl exit: $?"
